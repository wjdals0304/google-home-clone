<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.8.2/css/all.min.css" />
</head>
<body>
    <div class="header_view__container"> 
        <span>Gmail</span>
        <span>이미지</span>
        <span>Apps</span>
        <span>더보기</span>
    </div>
    <div class="search_view__container">
        <div class="search_view__column">
            <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="google_logo">
        </div>
        <div class="search_view__column"> 
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Google 검색">
        </div>
    </div>
    <div class="search_button__container">
        <div class="search_button__column">
            <button class="circle-button"></button>
            <span>웹스토어</span>
        </div>
        <div class="search_button__column">
            <button class="circle-button"></button>
            <span>바로가기 추가</span>
        </div>
    </div>
    <div class="bottom_view__container">
        <button class="bottom_view__button">
            <i class="fas fa-cog"></i>
            Chrome 맞춤설정
        </button>
    </div>
</body>
</html>
