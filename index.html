<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.8.2/css/all.min.css" />
</head>
<body>
    <ul class="header_view__container"> 
        </li><a href="#">Gmail</a></li>
        <li><a href="#">이미지</a></li>
        <li><a href="#">Apps</a></li>
        <li><a href="#">더보기</a></li>
    </ul>
    <div class="search_view__container">
        <div class="search_view__row">
            <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="구글 로고" width="272px" height="92px">
        </div>
        <form class="search_view_input_container"> 
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Google 검색">
        </form>
    </div>
    <div class="search_link__container">
        <div class="search_button_item">
            <a href="#" class="circle-button"></a>
            <span>웹스토어</span>
        </div>
        <div class="search_button_item">
            <a href="#" class="circle-button"></a>
            <span>바로가기 추가</span>
        </div>
    </div>
    <button class="bottom_view__button">
        <i class="fas fa-cog"></i>
        Chrome 맞춤설정
    </button>
</body>
</html>
